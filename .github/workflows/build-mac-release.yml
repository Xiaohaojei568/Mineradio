name: Build macOS release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  mac:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build macOS package
        run: npm run build:mac -- --${{ matrix.arch }} --publish never

      - name: Upload GitHub release assets
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/Mineradio-*-Mac-${{ matrix.arch }}.dmg \
            dist/Mineradio-*-Mac-${{ matrix.arch }}.zip \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Upload Gitee release assets
        run: |
          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "GITEE_TOKEN is not configured; skip Gitee upload."
            exit 0
          fi
          printf '%s' "$RELEASE_BODY" > release-body.md
          node build/sync-gitee-release.js \
            dist/Mineradio-*-Mac-${{ matrix.arch }}.dmg \
            dist/Mineradio-*-Mac-${{ matrix.arch }}.zip
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: xiao-majie
          GITEE_REPO: mineradio
          RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name || format('Mineradio {0}', github.event.inputs.tag) }}
          RELEASE_BODY: ${{ github.event.release.body || '' }}
          RELEASE_BODY_FILE: release-body.md
